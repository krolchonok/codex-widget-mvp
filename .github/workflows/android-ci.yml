name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codex-widget-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish rolling release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest app/build/outputs/apk/debug/app-debug.apk --clobber
            gh release edit latest --title "Latest Build" --notes "Rolling build from \`main\`." --prerelease
          else
            gh release create latest app/build/outputs/apk/debug/app-debug.apk \
              --title "Latest Build" \
              --notes "Rolling build from \`main\`." \
              --prerelease \
              --target main
          fi
